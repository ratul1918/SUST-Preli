services:
  - type: web
    name: queuestorm-investigator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MODEL_NAME
        value: gemini-2.5-flash
      - key: PYTHON_VERSION
        value: "3.10.12"
    healthCheckPath: /health
    plan: free
